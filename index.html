<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1B2D5E">
<title>TiefbauPorte v6 · Vor-Ort-Check</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="app.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">E</div>
    <h1>TiefbauPorte<small id="hdrSub">Vor-Ort-Check · Union E</small></h1>
  </div>
  <div class="modetoggle">
    <button id="btnModeEdit" class="active" data-mode="edit">✎ Bearbeiten</button>
    <button id="btnModeView" data-mode="view">👁 Ansicht</button>
  </div>
  <div class="sum" id="sumTotal">0,00 €</div>
</header>

<div id="map">
  <div class="searchbar">
    <input id="srchInput" type="text" placeholder="Adresse suchen...">
    <button id="srchBtn">🔍</button>
    <button id="snapBtn" class="snap" title="Kartenausschnitt speichern">📸</button>
  </div>
  <div class="searchres" id="srchRes"></div>

  <div class="layerctl">
    <div class="title">Karte</div>
    <div class="lrow">
      <button id="lyrMap" class="active">Straße</button>
      <button id="lyrSat">Sat</button>
    </div>
    <div class="sep"></div>
    <div class="title">Sichtbar</div>
    <div class="lrow">
      <button id="lyrHW" class="active">📍 HW</button>
      <button id="lyrTR" class="active">🚧 TR</button>
    </div>
    <div class="lrow">
      <button id="lyrLinks" title="Alle Asset↔Trassen-Verbindungen anzeigen">↗ Verbindungen</button>
    </div>
  </div>

  <div class="legend" id="legend"></div>
  <div class="sel-badge" id="selBadge"></div>
  <div class="info" id="infoBanner"></div>
</div>

<div class="modebar">
  <button id="btnModePin" class="active">📍 Objekt setzen</button>
  <button id="btnModeTrace" class="trace">🚧 Trasse zeichnen</button>
  <button id="btnModeDrag" class="edit">✋ Verschieben</button>
  <button id="btnLocate">🎯 GPS</button>
</div>

<div class="toolbar">
  <button id="btnCatalog">📋 Katalog</button>
  <button id="btnKalk">💰 Kalkulation</button>
  <button class="sec" id="btnMeta">📝 Projekt</button>
  <button class="sec" id="btnExport">📤 Export</button>
</div>

<!-- Modals (werden zur Laufzeit gefüllt) -->
<div class="modal" id="modalCatalog"><div class="sheet"></div></div>
<div class="modal" id="modalAddCat"><div class="sheet"></div></div>
<div class="modal" id="modalObj"><div class="sheet"></div></div>
<div class="modal" id="modalObjInfo"><div class="sheet"></div></div>
<div class="modal" id="modalTrace"><div class="sheet"></div></div>
<div class="modal" id="modalSeg"><div class="sheet"></div></div>
<div class="modal" id="modalKalk"><div class="sheet"></div></div>
<div class="modal" id="modalMeta"><div class="sheet"></div></div>
<div class="modal" id="modalExport"><div class="sheet"></div></div>
<div class="modal" id="modalCableTypes"><div class="sheet"></div></div>
<div class="modal" id="modalAddCable"><div class="sheet"></div></div>
<div class="modal" id="modalEmojiPicker"><div class="sheet"></div></div>
<div class="modal" id="modalPickCable"><div class="sheet"></div></div>

<script type="module" src="app.js"></script>
</body>
</html>
